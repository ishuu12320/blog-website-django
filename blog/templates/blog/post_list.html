<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
</head>
<body>

<h1>Blog Posts</h1>

<a href="{% url 'create_post' %}">Create New Blog</a>

<hr>

{% for post in posts %}
<div>
    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>
    <small>Author: {{ post.author }}</small>
    <small> | {{ post.created_at }}</small>
</div>
<hr>
{% empty %}
<p>No posts yet.</p>
{% endfor %}

</body>
</html>
